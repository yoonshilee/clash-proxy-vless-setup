# Generated from server/config/setup.conf(.example) by client/render-client-configs.sh

mode: global
mixed-port: 7897
allow-lan: false
log-level: info
ipv6: true
external-controller: ''
secret: set-your-secret
unified-delay: true
profile:
  store-selected: true
tun:
  enable: false
  stack: gvisor
  auto-route: true
  strict-route: false
  auto-detect-interface: true
  dns-hijack:
  - any:53
external-controller-pipe: \\.\pipe\verge-mihomo
external-controller-cors:
  allow-private-network: true
  allow-origins:
  - tauri://localhost
  - http://tauri.localhost
  - https://yacd.metacubex.one
  - https://metacubex.github.io
  - https://board.zash.run.place
proxies:
- name: example-vless-reality
  type: vless
  server: <server-public-ip>
  port: 443
  uuid: <generated-uuid>
  network: tcp
  udp: true
  tls: true
  flow: xtls-rprx-vision
  servername: www.cloudflare.com
  client-fingerprint: chrome
  packet-encoding: xudp
  reality-opts:
    public-key: <generated-public-key>
    short-id: <generated-short-id>
proxy-groups:
- name: PROXY
  type: select
  proxies:
  - example-vless-reality
rules:
- GEOSITE,microsoft,DIRECT
- DOMAIN-SUFFIX,outlook.com,DIRECT
- DOMAIN-SUFFIX,office.com,DIRECT
- DOMAIN-SUFFIX,office365.com,DIRECT
- DOMAIN-SUFFIX,microsoft.com,DIRECT
- DOMAIN-SUFFIX,live.com,DIRECT
- DOMAIN-SUFFIX,msftconnecttest.com,DIRECT
- DOMAIN-SUFFIX,msftncsi.com,DIRECT
- GEOSITE,openai,PROXY
- DOMAIN-SUFFIX,openai.com,PROXY
- DOMAIN-SUFFIX,chatgpt.com,PROXY
- DOMAIN-SUFFIX,oaistatic.com,PROXY
- DOMAIN-SUFFIX,oaiusercontent.com,PROXY
- MATCH,PROXY
